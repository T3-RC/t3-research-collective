// ── MATH HELPERS ────────────────────────────────────────────
const toRad = d => d * Math.PI / 180;

function wedgePath(cx,cy,r1,r2,aStart,aEnd){
  const s1=toRad(aStart),e1=toRad(aEnd),lg=aEnd-aStart>180?1:0;
  const cos=Math.cos,sin=Math.sin;
  return[
    `M${cx+r1*cos(s1)} ${cy+r1*sin(s1)}`,
    `L${cx+r2*cos(s1)} ${cy+r2*sin(s1)}`,
    `A${r2} ${r2} 0 ${lg} 1 ${cx+r2*cos(e1)} ${cy+r2*sin(e1)}`,
    `L${cx+r1*cos(e1)} ${cy+r1*sin(e1)}`,
    `A${r1} ${r1} 0 ${lg} 0 ${cx+r1*cos(s1)} ${cy+r1*sin(s1)} Z`
  ].join(' ');
}

function curvePath(x1,y1,x2,y2){
  const dx=x2-x1,dy=y2-y1;
  const cx=(x1+x2)/2-dy*0.18,cy=(y1+y2)/2+dx*0.18;
  return `M${x1} ${y1} Q${cx} ${cy} ${x2} ${y2}`;
}

// GTA WHEEL
// ──────────────────────────────────────────────────────────────
function GTAWheel({businesses, onClose}){
  const [hov,setHov] = React.useState(null);

  // Ring geometry
  const W=520, CX=W/2, CY=W/2;
  const R_INNER=96, R_OUTER=224, R_GAP=2.8, OFFSET=-90;

  // 8 slots — businesses at cardinal+intercardinal positions evenly
  const N=8;
  // Spread businesses into slots 0,2,4,6 (top, right, bottom, left)
  const BUS_SLOTS=[0,2,4,6];
  const slots=Array.from({length:N},(_,i)=>{
    const bi=BUS_SLOTS.indexOf(i);
    return bi>=0?(businesses[bi]||null):null;
  });

  const hovBiz=hov!==null?slots[hov]:null;

  React.useEffect(()=>{
    const fn=e=>{if(e.key==='Escape')onClose();};
    window.addEventListener('keydown',fn);
    return()=>window.removeEventListener('keydown',fn);
  },[]);

  return(
    <>
      {/* Dark backdrop */}
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',
        backdropFilter:'blur(6px)',zIndex:2000}}/>

      {/* Wheel */}
      <div style={{position:'fixed',top:'50%',left:'50%',
        transform:'translate(-50%,-50%)',
        opacity:1,
        zIndex:2001,
        display:'flex',flexDirection:'column',alignItems:'center',gap:0}}>

        <svg width={W} height={W} viewBox={`0 0 ${W} ${W}`} style={{display:'block',overflow:'visible'}}>
          <defs>
            <filter id="fg1" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="8" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="fg2" x="-100%" y="-100%" width="300%" height="300%">
              <feGaussianBlur stdDeviation="18" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <radialGradient id="cenGrad" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stopColor="rgba(0,212,255,0.12)"/>
              <stop offset="100%" stopColor="rgba(4,6,14,0)"/>
            </radialGradient>
            <radialGradient id="outerGrad" cx="50%" cy="50%" r="50%">
              <stop offset="82%" stopColor="transparent"/>
              <stop offset="100%" stopColor="rgba(0,212,255,0.04)"/>
            </radialGradient>
          </defs>

          {/* ── Thick outer shadow disc ── */}
          <circle cx={CX} cy={CY} r={R_OUTER+32} fill="rgba(3,5,12,0.97)"/>
          <circle cx={CX} cy={CY} r={R_OUTER+32} fill="url(#outerGrad)"/>
          <circle cx={CX} cy={CY} r={R_OUTER+32} fill="none" stroke="rgba(0,212,255,0.05)" strokeWidth="1"/>

          {/* ── Ring segments ── */}
          {slots.map((slot,i)=>{
            const a0=OFFSET+(360/N)*i, a1=a0+(360/N);
            const am=(a0+a1)/2, amR=toRad(am);
            const isHov=hov===i, hasBiz=!!slot;
            const outerR=isHov&&hasBiz?R_OUTER+14:R_OUTER;
            const innerR=isHov&&hasBiz?R_INNER-8:R_INNER;
            // Icon position
            const iconR=(innerR+outerR)/2;
            const ix=CX+iconR*Math.cos(amR), iy=CY+iconR*Math.sin(amR);

            return(
              <g key={i} style={{cursor:hasBiz?'pointer':'default'}}
                onMouseEnter={()=>hasBiz&&setHov(i)}
                onMouseLeave={()=>setHov(null)}
                onClick={e=>{e.stopPropagation();if(hasBiz)onClose();}}>

                {/* Hover glow behind segment */}
                {isHov&&hasBiz&&(
                  <path d={wedgePath(CX,CY,R_INNER-18,R_OUTER+24,a0+R_GAP/2,a1-R_GAP/2)}
                    fill={`${slot.color}15`} filter="url(#fg2)"/>
                )}

                {/* Main segment */}
                <path d={wedgePath(CX,CY,innerR,outerR,a0+R_GAP/2,a1-R_GAP/2)}
                  fill={
                    isHov&&hasBiz ? `${slot.color}22`
                    : hasBiz      ? 'rgba(14,19,35,0.97)'
                                  : 'rgba(8,11,20,0.9)'}
                  stroke={
                    isHov&&hasBiz ? slot.color
                    : hasBiz      ? 'rgba(0,212,255,0.11)'
                                  : 'rgba(255,255,255,0.025)'}
                  strokeWidth={isHov?2:1}
                  style={{transition:'fill 0.15s'}}
                />

                {/* Outer arc rim highlight on hover */}
                {isHov&&hasBiz&&(
                  <path d={wedgePath(CX,CY,R_OUTER+4,R_OUTER+14,a0+R_GAP/2,a1-R_GAP/2)}
                    fill={`${slot.color}44`} stroke={slot.color} strokeWidth="1"
                    filter="url(#fg1)"/>
                )}

                {/* Inner arc rim on hover */}
                {isHov&&hasBiz&&(
                  <path d={wedgePath(CX,CY,R_INNER-8,R_INNER-2,a0+R_GAP/2,a1-R_GAP/2)}
                    fill={`${slot.color}55`}/>
                )}

                {/* Icon */}
                {hasBiz?(
                  <text x={ix} y={iy} textAnchor="middle" dominantBaseline="central"
                    fill={isHov?slot.color:'#3d5270'}
                    fontSize={isHov?32:25}
                    fontFamily="'Orbitron',monospace"
                    filter={isHov?'url(#fg1)':undefined}
                    style={{userSelect:'none',transition:'fill 0.15s,font-size 0.1s'}}>
                    {slot.icon}
                  </text>
                ):(
                  <circle cx={ix} cy={iy} r="4" fill="rgba(0,212,255,0.05)"/>
                )}

                {/* Name label INSIDE segment near outer edge */}
                {hasBiz&&(()=>{
                  const lr=R_OUTER-20;
                  const lx2=CX+lr*Math.cos(amR), ly2=CY+lr*Math.sin(amR);
                  return(
                    <text x={lx2} y={ly2} textAnchor="middle" dominantBaseline="central"
                      fill={isHov?slot.color:'#253040'}
                      fontSize="7.5" fontFamily="'Orbitron',monospace" letterSpacing="1.5"
                      style={{userSelect:'none',transition:'fill 0.15s'}}>
                      {slot.name.replace('T3 ','').toUpperCase()}
                    </text>
                  );
                })()}
              </g>
            );
          })}

          {/* ── Inner hole ── */}
          <circle cx={CX} cy={CY} r={R_INNER} fill="rgba(3,5,12,0.99)"/>
          <circle cx={CX} cy={CY} r={R_INNER} fill="url(#cenGrad)"/>
          <circle cx={CX} cy={CY} r={R_INNER} fill="none" stroke="rgba(0,212,255,0.13)" strokeWidth="1.5"/>

          {/* ── Centre info ── */}
          {hovBiz?(
            <>
              <text x={CX} y={CY-26} textAnchor="middle" dominantBaseline="central"
                fill={hovBiz.color} fontSize="36" fontFamily="'Orbitron',monospace"
                filter="url(#fg1)" style={{userSelect:'none'}}>{hovBiz.icon}</text>
              <text x={CX} y={CY+18} textAnchor="middle"
                fill="#d0dff0" fontSize="10" fontFamily="'Orbitron',monospace" fontWeight="700" letterSpacing="2"
                style={{userSelect:'none'}}>{hovBiz.name.toUpperCase()}</text>
              <text x={CX} y={CY+35} textAnchor="middle"
                fill={hovBiz.color} fontSize="7.5" fontFamily="'Space Mono',monospace" opacity="0.7" letterSpacing="1.5"
                style={{userSelect:'none'}}>{hovBiz.tagline.toUpperCase()}</text>
            </>
          ):(
            <>
              <text x={CX} y={CY-10} textAnchor="middle"
                fill="#00d4ff" fontSize="24" fontFamily="'Orbitron',monospace" fontWeight="900" letterSpacing="4"
                filter="url(#fg1)" style={{userSelect:'none'}}>T3</text>
              <text x={CX} y={CY+14} textAnchor="middle"
                fill="#1e2e3e" fontSize="7.5" fontFamily="'Space Mono',monospace" letterSpacing="4"
                style={{userSelect:'none'}}>BUSINESSES</text>
            </>
          )}
        </svg>

        {/* Description strip docked below wheel */}
        <div style={{width:480,padding:'14px 28px',
          background:'rgba(5,7,15,0.97)',
          border:'1px solid rgba(0,212,255,0.08)',borderTop:'2px solid rgba(0,212,255,0.06)',
          textAlign:'center',marginTop:-8,minHeight:56,
          display:'flex',alignItems:'center',justifyContent:'center',gap:14}}>
          {hovBiz?(
            <>
              <span style={{fontFamily:"'Orbitron',monospace",fontSize:9,letterSpacing:2,
                color:hovBiz.color,whiteSpace:'nowrap',flexShrink:0}}>{hovBiz.tagline}</span>
              <span style={{width:1,height:16,background:'rgba(0,212,255,0.12)',flexShrink:0}}/>
              <p style={{fontFamily:"'Rajdhani',sans-serif",fontSize:13.5,fontWeight:300,
                color:'#5a7090',lineHeight:1.5,textAlign:'left'}}>{hovBiz.desc}</p>
            </>
          ):(
            <p style={{fontFamily:"'Space Mono',monospace",fontSize:8,letterSpacing:3,
              color:'#1e2e3e'}}>HOVER A SEGMENT</p>
          )}
        </div>

        {/* ESC hint */}
        <div style={{marginTop:10,fontFamily:"'Space Mono',monospace",fontSize:7.5,
          letterSpacing:2,color:'#1a2430'}}>ESC or CLICK OUTSIDE TO CLOSE</div>
      </div>
    </>
  );
}

// ──────────────────────────────────────────────────────────────
// NETWORK GRAPH
// ──────────────────────────────────────────────────────────────
function NetworkGraph({data,selected,onSelect,showPeople,hovPerson,onHovPerson,hlProjects}){
  const [hov,setHov]=React.useState(null);
  const NR=28, PR=14;

  const personPos=React.useMemo(()=>{
    const pos={},byProj={};
    data.people.forEach(p=>{const pid=p.projects[0];if(pid){if(!byProj[pid])byProj[pid]=[];byProj[pid].push(p.id);}});
    data.people.forEach(person=>{
      const proj=data.projects.find(p=>p.id===person.projects[0]);
      if(!proj) return;
      const sibs=byProj[person.projects[0]]||[],idx=sibs.indexOf(person.id),total=sibs.length;
      const a0=-2.4,a1=-0.7;
      const angle=total>1?a0+(a1-a0)*idx/(total-1):(a0+a1)/2;
      pos[person.id]={x:proj.x+Math.cos(angle)*68,y:proj.y+Math.sin(angle)*68};
    });
    return pos;
  },[data]);

  const edges=React.useMemo(()=>{
    const seen=new Set(),res=[];
    data.projects.forEach(p=>p.connections.forEach(cid=>{
      const key=[p.id,cid].sort().join('|');
      if(seen.has(key))return;seen.add(key);
      const t=data.projects.find(q=>q.id===cid);
      if(t)res.push({from:p,to:t});
    }));
    return res;
  },[data]);

  const personEdges=React.useMemo(()=>{
    if(!showPeople)return[];
    return data.people.flatMap(person=>{
      const pp=personPos[person.id];if(!pp)return[];
      return person.projects.map(pid=>{
        const proj=data.projects.find(p=>p.id===pid);
        return proj?{person,proj,pp}:null;
      }).filter(Boolean);
    });
  },[data,showPeople,personPos]);

  return(
    <svg viewBox="0 0 800 570" style={{width:'100%',height:'100%',display:'block'}}
      onClick={()=>onSelect(null)}>
      <defs>
        <pattern id="gp" width="50" height="50" patternUnits="userSpaceOnUse">
          <path d="M50 0L0 0 0 50" fill="none" stroke="rgba(0,212,255,0.04)" strokeWidth="0.5"/>
        </pattern>
        <radialGradient id="bgr" cx="50%" cy="50%" r="55%">
          <stop offset="0%" stopColor="rgba(0,212,255,0.05)"/>
          <stop offset="100%" stopColor="transparent"/>
        </radialGradient>
      </defs>
      <rect width="800" height="570" fill="url(#gp)"/>
      <ellipse cx="400" cy="285" rx="380" ry="260" fill="url(#bgr)"/>

      {/* Edges */}
      {edges.map((e,i)=>{
        const selEdge=selected&&(selected.id===e.from.id||selected.id===e.to.id
          ||(hlProjects?.includes(e.from.id)&&hlProjects?.includes(e.to.id)));
        const both=e.from.status==='active'&&e.to.status==='active';
        return<path key={i} d={curvePath(e.from.x,e.from.y,e.to.x,e.to.y)} fill="none"
          stroke={selEdge?'rgba(0,212,255,0.55)':'rgba(0,212,255,0.08)'}
          strokeWidth={selEdge?1.5:0.8} strokeDasharray={both?'':'5 4'}/>;
      })}

      {/* Person edges */}
      {personEdges.map((e,i)=>{
        const h=hovPerson===e.person.id;
        return<line key={i} x1={e.proj.x} y1={e.proj.y} x2={e.pp.x} y2={e.pp.y}
          stroke={h?'rgba(0,212,255,0.45)':'rgba(0,212,255,0.09)'} strokeWidth={h?1.5:0.6} strokeDasharray="3 4"/>;
      })}

      {/* Project nodes */}
      {data.projects.map(proj=>{
        const s=SC[proj.status],isSel=selected?.id===proj.id,isHov=hov===proj.id;
        const isHl=hlProjects?.includes(proj.id),active=isSel||isHov||isHl;
        const dim=s.label!=='Active'&&!active;
        return(
          <g key={proj.id} transform={`translate(${proj.x},${proj.y})`} style={{cursor:'pointer'}}
            onClick={ev=>{ev.stopPropagation();onSelect(proj);}}
            onMouseEnter={()=>setHov(proj.id)} onMouseLeave={()=>setHov(null)}>
            {active&&<circle r={NR+12} fill={s.bg} stroke={s.color} strokeWidth="1" opacity="0.7"/>}
            {dim&&<circle r={NR+6} fill="none" stroke={s.color} strokeWidth="0.8" strokeDasharray="4 3" opacity="0.3"/>}
            <circle r={NR} fill="rgba(13,18,32,0.97)" stroke={s.color} strokeWidth={isSel?2.5:1.5} opacity={dim?0.55:1}/>
            <text y="-3" textAnchor="middle" dominantBaseline="middle"
              fill={dim?s.color+'44':s.color} fontSize="13" fontFamily="'Orbitron',monospace"
              style={{userSelect:'none'}}>{proj.icon}</text>
            {dim&&<text y="9" textAnchor="middle" fill={s.color} fontSize="5.5"
              opacity="0.6" fontFamily="'Space Mono',monospace" style={{userSelect:'none'}}>LOCKED</text>}
            <text y={NR+13} textAnchor="middle"
              fill={dim?'#1e2a38':active?'#d8e8f5':'#4a6070'}
              fontSize="7" fontFamily="'Orbitron',monospace" letterSpacing="0.8"
              style={{userSelect:'none'}}>{proj.name}</text>
            <text y={NR+22} textAnchor="middle" fill={dim?'#141e28':'#243040'}
              fontSize="5.5" fontFamily="'Space Mono',monospace" style={{userSelect:'none'}}>
              {proj.segment.toUpperCase()}
            </text>
          </g>
        );
      })}

      {/* Person nodes */}
      {showPeople&&data.people.map(person=>{
        const pp=personPos[person.id];if(!pp)return null;
        const h=hovPerson===person.id;
        return(
          <g key={person.id} transform={`translate(${pp.x},${pp.y})`} style={{cursor:'pointer'}}
            onMouseEnter={()=>onHovPerson(person.id)} onMouseLeave={()=>onHovPerson(null)}
            onClick={ev=>{ev.stopPropagation();onSelect({_type:'person',...person});}}>
            {h&&<circle r={PR+6} fill="rgba(0,212,255,0.05)" stroke="rgba(0,212,255,0.2)" strokeWidth="1"/>}
            <circle r={PR} fill="rgba(10,14,26,0.97)" stroke={h?'#00d4ff':'rgba(0,212,255,0.2)'} strokeWidth="1"/>
            <text y="0" textAnchor="middle" dominantBaseline="central"
              fill={h?'#00d4ff':'#4a6070'} fontSize="8" fontFamily="'Orbitron',monospace" fontWeight="700"
              style={{userSelect:'none'}}>{person.name.split(' ').map(n=>n[0]).join('')}</text>
          </g>
        );
      })}
    </svg>
  );
}

// ──────────────────────────────────────────────────────────────
// SIDE PANELS
// ──────────────────────────────────────────────────────────────

        display:'flex',alignItems:'center',gap:12,flexShrink:0}}>

          background:s.bg,flexShrink:0}}>{project.icon}</div>

      <div style={{flex:1,overflowY:'auto',padding:'16px'}}>
        <div style={{display:'inline-flex',alignItems:'center',gap:6,padding:'3px 11px',

              textTransform:'uppercase',marginBottom:10}}>Capabilities</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5,marginBottom:20}}>

                <div key={i} style={{padding:'7px 9px',border:'1px solid rgba(0,212,255,0.07)',
                  background:'rgba(0,0,0,0.2)',display:'flex',alignItems:'center',gap:5}}>
                  <span style={{width:3,height:3,background:'#00d4ff',flexShrink:0}}/>
                  <span style={{fontFamily:"'Space Mono',monospace",fontSize:7.5,color:'#5a7090'}}>{sp}</span>
                </div>
              ))}
            </div>
            {researchers.length>0&&<>
              <div style={{fontFamily:"'Orbitron',monospace",fontSize:8,letterSpacing:3,color:'#1e2e3e',
                textTransform:'uppercase',marginBottom:10}}>Research Team</div>
              {researchers.map(r=>(
                <button key={r.id} onClick={()=>onPerson({_type:'person',...r})}
                  style={{display:'flex',alignItems:'center',gap:10,padding:'9px 11px',width:'100%',
                    background:'rgba(0,0,0,0.18)',border:'1px solid rgba(0,212,255,0.07)',
                    cursor:'pointer',textAlign:'left',marginBottom:5,transition:'border-color 0.18s'}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor='rgba(0,212,255,0.28)'}
                  onMouseLeave={e=>e.currentTarget.style.borderColor='rgba(0,212,255,0.07)'}>
                  <div style={{width:26,height:26,border:'1px solid rgba(0,212,255,0.25)',
                    display:'flex',alignItems:'center',justifyContent:'center',
                    fontFamily:"'Orbitron',monospace",fontSize:9,color:'#00d4ff',flexShrink:0}}>{r.name[0]}</div>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:"'Orbitron',monospace",fontSize:9.5,letterSpacing:1,color:'#dde8f5'}}>{r.name}</div>
                    <div style={{fontFamily:"'Space Mono',monospace",fontSize:7,color:'#243040',marginTop:1}}>{r.role}</div>
                  </div>
                  <span style={{color:'#243040',fontSize:11}}>▶</span>
                </button>
              ))}
            </>}
          </>
        ):(
          <>
            <div style={{fontFamily:"'Orbitron',monospace",fontSize:8,letterSpacing:3,color:s.color,
              textTransform:'uppercase',opacity:0.7,marginBottom:8}}>Our Vision</div>
            <p style={{fontSize:13,fontWeight:300,lineHeight:1.85,color:'#5a7090',marginBottom:20}}>{project.vision}</p>
            <div style={{fontFamily:"'Orbitron',monospace",fontSize:8,letterSpacing:3,color:'#1e2e3e',
              textTransform:'uppercase',marginBottom:10}}>What's Blocking Us</div>
            {project.blockers.map((b,i)=>(
              <div key={i} style={{display:'flex',alignItems:'flex-start',gap:8,padding:'8px 10px',
                border:`1px solid ${s.color}1a`,background:s.bg,marginBottom:5}}>
                <span style={{color:s.color,fontSize:9,flexShrink:0,marginTop:1}}>◆</span>
                <span style={{fontFamily:"'Space Mono',monospace",fontSize:8.5,color:'#5a7090'}}>{b}</span>
              </div>
            ))}
            <div style={{border:`1px solid ${s.color}40`,background:s.bg,padding:16,marginTop:16}}>
              <div style={{fontFamily:"'Orbitron',monospace",fontSize:8,letterSpacing:3,color:s.color,
                textTransform:'uppercase',marginBottom:6}}>Sponsor This Project</div>
              <p style={{fontSize:13,fontWeight:300,lineHeight:1.7,color:'#5a7090',marginBottom:14}}>{project.sponsorOpportunity}</p>
              <button style={{fontFamily:"'Orbitron',monospace",fontSize:8.5,letterSpacing:2,
                textTransform:'uppercase',padding:'10px 18px',background:s.bg,
                border:`1px solid ${s.color}`,color:s.color,cursor:'pointer',width:'100%',
                clipPath:'polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%)'}}>
                Inquire About Sponsorship ▶
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

    <div style={{position:'absolute',top:0,right:0,width:360,height:'100%',
      background:'rgba(6,9,18,0.99)',borderLeft:'1px solid rgba(0,212,255,0.1)',
      display:'flex',flexDirection:'column',animation:'slideR 0.2s ease'}}>
      <div style={{padding:'14px 18px',borderBottom:'1px solid rgba(0,212,255,0.07)',
        display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
        <div style={{width:36,height:36,border:'1px solid rgba(0,212,255,0.28)',display:'flex',
          alignItems:'center',justifyContent:'center',fontFamily:"'Orbitron',monospace",
          fontSize:14,fontWeight:700,color:'#00d4ff',background:'rgba(0,212,255,0.06)',flexShrink:0}}>
          {person.name[0]}

          <div style={{fontFamily:"'Orbitron',monospace",fontSize:11.5,fontWeight:700,letterSpacing:1.5,color:'#dde8f5'}}>{person.name}</div>

        <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:16}}>

            <span key={i} style={{fontFamily:"'Space Mono',monospace",fontSize:7.5,letterSpacing:1,

              onMouseEnter={e=>e.currentTarget.style.borderColor=s.color+'44'}

              <span style={{fontSize:14,color:s.color,flexShrink:0}}>{p.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontFamily:"'Orbitron',monospace",fontSize:9.5,letterSpacing:1,color:'#dde8f5'}}>{p.name}</div>
                <div style={{fontFamily:"'Space Mono',monospace",fontSize:7,color:'#243040',marginTop:1}}>{p.subtitle}</div>
              </div>
              <span style={{color:'#243040',fontSize:11}}>▶</span>

      <div style={{flex:1,overflowY:'auto',padding:'8px'}}>
        {data.people.map(person=>{
          const projs=person.projects.map(pid=>data.projects.find(p=>p.id===pid)).filter(Boolean);
          return(
            <button key={person.id} onClick={()=>onSelect({_type:'person',...person})}

              onMouseLeave={e=>{e.currentTarget.style.borderColor='rgba(0,212,255,0.05)';e.currentTarget.style.background='rgba(0,0,0,0.14)';}}>

                  display:'flex',alignItems:'center',justifyContent:'center',
                  fontFamily:"'Orbitron',monospace",fontSize:8,color:'#00d4ff',flexShrink:0}}>{person.name[0]}</div>
                <div>
                  <div style={{fontFamily:"'Orbitron',monospace",fontSize:9,letterSpacing:1,color:'#dde8f5'}}>{person.name}</div>
                  <div style={{fontFamily:"'Space Mono',monospace",fontSize:7,color:'#243040',marginTop:1}}>{person.role}</div>

              </div>
              <div style={{display:'flex',gap:4,flexWrap:'wrap',paddingLeft:33}}>

                  <span key={p.id} style={{fontFamily:"'Space Mono',monospace",fontSize:7,
                    color:s.color,padding:'2px 5px',border:`1px solid ${s.color}28`,background:s.bg}}>
                    {p.icon} {p.name}

// ──────────────────────────────────────────────────────────────
// LEGEND + SPONSOR
// ──────────────────────────────────────────────────────────────
function Legend(){
  return(
    <div style={{position:'absolute',top:14,right:14,padding:'10px 13px',
      background:'rgba(5,7,15,0.92)',border:'1px solid rgba(0,212,255,0.07)',
      backdropFilter:'blur(8px)'}}>
      <div style={{fontFamily:"'Space Mono',monospace",fontSize:7,letterSpacing:2.5,
        color:'#1e2e3e',textTransform:'uppercase',marginBottom:8}}>Node Status</div>
      {Object.entries(SC).map(([k,v])=>{
        const cnt=DATA.projects.filter(p=>p.status===k).length;
        return(
          <div key={k} style={{display:'flex',alignItems:'center',gap:7,marginBottom:5}}>
            <div style={{width:7,height:7,borderRadius:'50%',background:v.color,flexShrink:0}}/>
            <span style={{fontFamily:"'Space Mono',monospace",fontSize:7,color:'#2a3a4e',flex:1}}>{v.label}</span>
            <span style={{fontFamily:"'Space Mono',monospace",fontSize:7,color:v.color,opacity:0.7}}>{cnt}</span>
          </div>
        );
      })}
    </div>
  );
}

function SponsorBadge(){
  if(!DATA.sponsors.length) return null;
  return(
    <div style={{position:'absolute',bottom:18,left:20,display:'flex',alignItems:'center',
      gap:10,pointerEvents:'none',userSelect:'none'}}>
      <span style={{fontFamily:"'Space Mono',monospace",fontSize:7,letterSpacing:2,
        color:'#141e28',textTransform:'uppercase'}}>Sponsored by</span>
      {DATA.sponsors.map((sp,i)=>(
        <React.Fragment key={i}>
          <span style={{fontFamily:"'Orbitron',monospace",fontSize:9,letterSpacing:2,
            color:'#1e2e3e',fontWeight:700}}>{sp.name}</span>
          <span style={{fontFamily:"'Space Mono',monospace",fontSize:7,
            color:'#0e1820',letterSpacing:1}}>· {sp.tagline}</span>
        </React.Fragment>
      ))}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────
// APP
// ──────────────────────────────────────────────────────────────
function App(){
  const [sel,setSel]=React.useState(null);
  const [showPeople,setShowPeople]=React.useState(false);
  const [showDir,setShowDir]=React.useState(false);
  const [hovPerson,setHovPerson]=React.useState(null);
  const [wheel,setWheel]=React.useState(false);

  const handleSelect=React.useCallback(node=>{
    setSel(node);
    if(node)setShowDir(false);
  },[]);

  const hlProjects=sel?._type==='person'?sel.projects:null;

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',background:'#04060e'}}>

      {/* NAV */}
      <nav style={{height:52,display:'flex',alignItems:'center',justifyContent:'space-between',
        padding:'0 20px',background:'rgba(3,5,12,0.95)',borderBottom:'1px solid rgba(0,212,255,0.07)',
        backdropFilter:'blur(16px)',flexShrink:0,zIndex:100}}>
        <div style={{display:'flex',alignItems:'center',gap:10,fontFamily:"'Orbitron',monospace",
          fontSize:13,fontWeight:700,letterSpacing:3,color:'#00d4ff',
          textShadow:'0 0 20px rgba(0,212,255,0.3)'}}>
          <div style={{width:24,height:24,border:'2px solid #00d4ff',display:'flex',alignItems:'center',
            justifyContent:'center',fontSize:8,fontFamily:"'Orbitron',monospace",fontWeight:700,
            clipPath:'polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%)',
            background:'rgba(0,212,255,0.05)',color:'#00d4ff'}}>T3</div>
          T3–RC
          <span style={{fontFamily:"'Space Mono',monospace",fontSize:7.5,letterSpacing:2,
            color:'rgba(0,212,255,0.25)',fontWeight:400,marginLeft:2}}>PROJECT NETWORK</span>
        </div>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          {[
            {label:'Researchers',active:showPeople,fn:()=>setShowPeople(p=>!p)},
            {label:'Team Directory',active:showDir,fn:()=>{setShowDir(d=>!d);setSel(null);}},
          ].map(b=>(
            <button key={b.label} onClick={b.fn} style={{fontFamily:"'Orbitron',monospace",
              fontSize:8,letterSpacing:1.5,textTransform:'uppercase',padding:'5px 13px',
              border:`1px solid ${b.active?'#00d4ff':'rgba(0,212,255,0.12)'}`,
              background:b.active?'rgba(0,212,255,0.08)':'none',
              color:b.active?'#00d4ff':'#2a3a4e',cursor:'pointer',transition:'all 0.15s'}}>{b.label}</button>
          ))}
          <div style={{width:1,height:18,background:'rgba(0,212,255,0.08)'}}/>
          {Object.entries(SC).map(([k,v])=>{
            const cnt=DATA.projects.filter(p=>p.status===k).length;
            return(
              <div key={k} style={{fontFamily:"'Space Mono',monospace",fontSize:7,letterSpacing:0.8,
                padding:'3px 7px',border:`1px solid ${v.color}28`,color:v.color,background:v.bg}}>
                {cnt} {v.label}
              </div>
            );
          })}
        </div>
      </nav>

      {/* CANVAS */}
      <div style={{flex:1,position:'relative',overflow:'hidden'}}>
        <NetworkGraph data={DATA} selected={sel} onSelect={handleSelect}
          showPeople={showPeople} hovPerson={hovPerson} onHovPerson={setHovPerson}
          hlProjects={hlProjects}/>
        <Legend/>
        <SponsorBadge/>

        {showDir&&(
          <PeopleDirectory data={DATA}
            onSelect={node=>{handleSelect(node);setShowDir(false);}}
            onClose={()=>setShowDir(false)}/>
        )}

        {sel&&(
          sel._type==='person'
            ?<PersonPanel person={sel} data={DATA} onClose={()=>setSel(null)} onProject={p=>setSel(p)}/>
            :<ProjectPanel project={sel} data={DATA} onClose={()=>setSel(null)} onPerson={setSel}/>
        )}

        {/* ── BUSINESSES BUTTON ── */}
        <button
          onClick={e=>{e.stopPropagation();setWheel(w=>!w);}}
          style={{
            position:'absolute',bottom:20,right:20,
            fontFamily:"'Orbitron',monospace",fontSize:10,fontWeight:700,
            letterSpacing:2.5,textTransform:'uppercase',
            padding:'12px 28px',
            border:`1px solid ${wheel?'#00d4ff':'rgba(0,212,255,0.35)'}`,
            background:wheel?'rgba(0,212,255,0.12)':'rgba(5,7,15,0.96)',
            color:wheel?'#00d4ff':'rgba(0,212,255,0.6)',
            cursor:'pointer',
            clipPath:'polygon(10px 0,100% 0,calc(100% - 10px) 100%,0 100%)',
            display:'flex',alignItems:'center',gap:10,
            boxShadow:wheel
              ?'0 0 30px rgba(0,212,255,0.25),inset 0 0 20px rgba(0,212,255,0.04)'
              :'0 0 16px rgba(0,0,0,0.6)',
            transition:'all 0.2s ease',
            zIndex:500,
          }}>
          <span style={{fontSize:16,lineHeight:1}}>⬡</span>
          BUSINESSES
          <span style={{fontSize:10,opacity:0.5,lineHeight:1}}>{wheel?'▲':'▼'}</span>
        </button>
      </div>

      {/* GTA WHEEL OVERLAY */}
      {wheel&&<GTAWheel businesses={DATA.businesses} onClose={()=>setWheel(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
